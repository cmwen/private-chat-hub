name: private_chat_hub
description: "Private Chat Hub - Universal AI chat platform with local, self-hosted (Ollama), and cloud AI support"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # HTTP & Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.2
  
  # Local Storage
  sqflite: ^2.4.1
  path: any
  shared_preferences: ^2.5.4
  path_provider: ^2.1.0
  flutter_secure_storage: ^9.2.2
  
  # Data Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  
  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.1
  logger: ^2.5.0
  
  # Image Handling
  image_picker: ^1.1.2
  image: ^4.3.0
  
  # File Handling  
  file_picker: ^8.1.4
  mime: ^2.0.0
  
  # AI Model Providers
  # Note: mediapipe_text is not available on pub.dev yet, using method channels
  # For OpenAI compatibility (LiteLLM proxy)
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  
  build_runner: any
  freezed: any
  json_serializable: any
  riverpod_generator: any

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
